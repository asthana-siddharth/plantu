version: "3.9"

services:
  mysql-primary:
    image: mysql:8.4
    container_name: plantu-mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: plantu_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./backend/mysql/primary/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./backend/mysql/primary/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  mysql-secondary:
    image: mysql:8.4
    container_name: plantu-mysql-secondary
    restart: unless-stopped
    depends_on:
      mysql-primary:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: plantu_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_secondary_data:/var/lib/mysql
      - ./backend/mysql/secondary/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./backend/mysql/secondary/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: plantu-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  mysql_primary_data:
  mysql_secondary_data:
  es_data:
